name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew testDebugUnitTest :core-domain:test

      - name: Lint
        run: ./gradlew :app:lintDebug

      - name: Release build (debug-signed fallback when no keystore secrets)
        run: ./gradlew :app:bundleRelease
        env:
          DXA_STORE_FILE: ${{ secrets.DXA_STORE_FILE && 'upload.keystore' || '' }}

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/**'

  # Publishes the signed AAB + listing to the internal track on every v* tag.
  # Requires repo secrets: DXA_KEYSTORE_BASE64, DXA_STORE_PASSWORD, DXA_KEY_ALIAS,
  # DXA_KEY_PASSWORD, ANDROID_PUBLISHER_CREDENTIALS (service-account JSON content).
  publish-internal:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode upload keystore
        run: echo "${{ secrets.DXA_KEYSTORE_BASE64 }}" | base64 -d > upload.keystore

      - name: Publish to internal track
        run: ./gradlew publishReleaseApps
        env:
          DXA_STORE_FILE: upload.keystore
          DXA_STORE_PASSWORD: ${{ secrets.DXA_STORE_PASSWORD }}
          DXA_KEY_ALIAS: ${{ secrets.DXA_KEY_ALIAS }}
          DXA_KEY_PASSWORD: ${{ secrets.DXA_KEY_PASSWORD }}
          ANDROID_PUBLISHER_CREDENTIALS: ${{ secrets.ANDROID_PUBLISHER_CREDENTIALS }}
